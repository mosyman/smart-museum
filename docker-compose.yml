services:
  mysql:
    image: mysql:8.0
    container_name: smart-museum-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123654}
      MYSQL_DATABASE: ${DB_NAME:-smart_museum}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-123654}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: smart-museum-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-smart_museum}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123654}
      TZ: Asia/Shanghai
    ports:
      - "8081:8081"

volumes:
  mysql_data:
